name: destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - run: echo "Destroy requested for solidtime-production"

  destroy_approval:
    name: Destroy Approval
    needs: prepare
    environment: destroy-production
    runs-on: ubuntu-latest
    steps:
      - uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: ${{ vars.APPLY_APPROVERS || github.actor }}
          minimum-approvals: 1
          issue-title: "Approve DESTROY — solidtime-production"
          issue-body: |
            ### ⚠️ WARNING: DESTRUCTIVE ACTION

            This will destroy **all** SolidTime infrastructure:
            - ECS services and tasks
            - RDS PostgreSQL instance (final snapshot will be taken)
            - S3 bucket and all data
            - ECR repository and all images
            - ALB, VPC, subnets, NAT Gateway, IAM roles, security groups
            - Secrets Manager secrets

            Reply with **approved** to proceed with destruction.
            Reply with **denied** to cancel.

  terraform_destroy:
    name: Terraform Destroy
    needs: [prepare, destroy_approval]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: infra/terraform
        run: terraform destroy -auto-approve
